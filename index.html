    function b64ToBuf(b){
      var s = atob(b), u = new Uint8Array(s.length);
      for (var i=0;i<s.length;i++) u[i] = s.charCodeAt(i);
      return u.buffer;
    }

    async function deriveKey(pw){
      var km = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']);
      return crypto.subtle.deriveKey(
        { name:'PBKDF2', salt: b64ToBuf(SALT), iterations:100000, hash:'SHA-256' },
        km, { name:'AES-GCM', length:256 }, false, ['decrypt']
      );
    }
    async function tryDecrypt(pw){
      var key = await deriveKey(pw);
      var plain = await crypto.subtle.decrypt(
        { name:'AES-GCM', iv: b64ToBuf(IV) }, key, b64ToBuf(PAYLOAD)
      );
      return new TextDecoder().decode(plain);
    }

      var p = document.getElementById('p').value;
      var btn = document.getElementById('b');
      if (USERS.indexOf(u) === -1) { showErr('账号不存在'); return; }
      if (!p) { showErr('请输入密码'); return; }
      btn.disabled = true; showErr('验证中…');
      try {
        var html = await tryDecrypt(p);
        var frame = document.getElementById('frame');
        frame.srcdoc = html;
        document.getElementById('login').style.display = 'none';
        frame.style.display = 'block';
      } catch (err) {
        showErr('账号或密码错误');
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
